name: Digital Watcher - Check Websites

# This workflow is triggered ONLY from the outside:
#  - repository_dispatch: sent by cron-job.org at the exact scheduled time
#  - workflow_dispatch: lets you run it manually from the Actions tab
# There is no internal "schedule:" cron here on purpose, because GitHub's
# built-in cron can be several minutes late - cron-job.org is used instead
# for minute-accurate timing.
on:
  repository_dispatch:
    types: [digital-watcher-check]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run Digital Watcher agent
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python agent/check_sites.py

      - name: Save updated snapshots and profile state
        run: |
          git config user.name "digital-watcher-bot"
          git config user.email "actions@github.com"
          git add snapshots profiles.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update snapshots and profile state [skip ci]"
          # profiles.json can also be edited by the Streamlit app around the
          # same time, so rebase onto the latest remote before pushing.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, retrying with rebase (attempt $attempt)..."
            git pull --rebase origin main
          done
          git push
